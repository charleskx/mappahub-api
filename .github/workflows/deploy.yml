name: Deploy

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  ci:
    name: Lint · Build · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  release-and-deploy:
    name: Release & Deploy to Coolify
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Sem notas de versão. Consulte os commits para detalhes."
          fi
          # Write to file to avoid multiline env issues
          echo "$NOTES" > /tmp/release_notes.md
          echo "notes_file=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.tag }}"
          body_path: ${{ steps.changelog.outputs.notes_file }}
          draft: false
          prerelease: false

      - name: Deploy API to Coolify
        run: |
          echo "Deploying API server..."
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.COOLIFY_WEBHOOK_API }}" \
            -H "Content-Type: application/json" | grep -q "^2" && \
            echo "✓ API deploy triggered" || \
            (echo "✗ API deploy failed" && exit 1)

      - name: Deploy Worker to Coolify
        run: |
          echo "Deploying worker..."
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.COOLIFY_WEBHOOK_WORKER }}" \
            -H "Content-Type: application/json" | grep -q "^2" && \
            echo "✓ Worker deploy triggered" || \
            (echo "✗ Worker deploy failed" && exit 1)
